name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r omnidrive-web/api/requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint with ruff
        run: ruff check omnidrive/ tests/ omnidrive-web/api/app

      - name: Type check API
        run: |
          cd omnidrive-web/api
          python -m mypy app --ignore-missing-imports || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Test API imports
        run: |
          cd omnidrive-web/api
          python -c "from app.main import app; print('API imports OK')"

